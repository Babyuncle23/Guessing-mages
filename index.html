<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing mages</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="loader" class="drum-animation"><span>No...</span> <span>NiiN...</span></div>
        <img id="img" src="" alt="teeman kuva">
        <div id="themeDisplay"></div>
        <button id="btn">Ehto</button> <!-- Кнопка теперь последняя -->
        <ol id="wordList"></ol>
        <button id="btnDisplayWords">Sanasi</button>
    </div>
    <script>

const forbiddenWords = ["eivät", "kuin", "kasvattajaseura", "syksymmäksi"];

const themes = [
    "pantomiimi", "pantomiimi", "pantomiimi",
    "piirtäminen", "piirtäminen", "piirtäminen",
    "espanja", "ilman verbejä", "ilman substantiiveja",
    "vastakohdan kautta", "kaksi ehtoa", "elokuva",
    "perusvaihtoehto", "vapaavalintainen"
];

const themeImages = {
    "pantomiimi": "pictures/pantomiimi.jpg",
    "piirtäminen": "pictures/doggo.jpg",
    "espanja": "pictures/duo.jpg",
    "ilman verbejä": "pictures/no_verbs.jpg",
    "ilman substantiiveja": "pictures/no_nouns.jpg",
    "vastakohdan kautta": "pictures/opposite.png",
    "kaksi ehtoa": "pictures/2_options.jpg",
    "elokuva": "pictures/movies_rock.jpg",
    "perusvaihtoehto": "pictures/basic.jpg",
    "vapaavalintainen": "pictures/freeoption.png"
};

// Рекомендуется скачать эти файлы локально в папку sounds/
const themeSounds = {
    "pantomiimi": "",
    "piirtäminen": "sounds/Unknown_Crayon_Drawing_Sound.ogg",
    "espanja": "",
    "ilman verbejä": "",
    "ilman substantiiveja": "",
    "vastakohdan kautta": "",
    "kaksi ehtoa": "sounds/Bruh_Sound_Effect.ogg",
    "elokuva": "sounds/Wilhelm_Scream_1.ogg",
    "perusvaihtoehto": "",
    "vapaavalintainen": ""
};

const btn = document.getElementById("btn");
const themeDisplay = document.getElementById("themeDisplay");
const themeImage = document.getElementById("img");
const loader = document.getElementById("loader");
const btnDisplayWords = document.getElementById("btnDisplayWords");
const container = document.querySelector(".container");
const wordList = document.getElementById("wordList");

const flipSound = new Audio("sounds/freesound_community-flipcard-91468.mp3");
const drumRoll = new Audio("sounds/Hollywoodedge,_Snare_Drum_Roll_End_CRT042801.ogg");

const randomizeTheme = () => {
    btn.disabled = true;
    btn.style.opacity = "0.7";
    btnDisplayWords.style.display = "none";
    
    themeDisplay.textContent = "";
    themeDisplay.style.display = "block"; // Возвращаем видимость текстового блока
    themeImage.style.display = "none";
    loader.style.display = "block"; 

    drumRoll.currentTime = 3;
    drumRoll.play().catch(e => console.log("Sound autoplay blocked"));

    wordList.style.display = "none";

    setTimeout(() => {
        loader.style.display = "none";

        const nyt = document.createElement('div');
        nyt.className = 'flash-now';
        nyt.textContent = 'NYT!';
        container.appendChild(nyt);

        if (navigator.vibrate) navigator.vibrate(100);

        setTimeout(() => {
            nyt.remove(); 
            
            const randomIndex = Math.floor(Math.random() * themes.length);
            const randomTheme = themes[randomIndex];

            themeDisplay.textContent = randomTheme;

            const imageUrl = themeImages[randomTheme];
            const isLandscape = window.innerHeight < 500 && window.innerWidth > window.innerHeight;

            // ИСПРАВЛЕНО: Управление отображением картинки перенесено строго сюда
            if (imageUrl && imageUrl !== "") {
                themeImage.src = imageUrl;
                themeImage.style.display = "block";
                themeDisplay.style.marginTop = isLandscape ? "0" : "20px";
            } else {
                themeImage.style.display = "none";
                themeDisplay.style.marginTop = "0";
            }

            const soundUrl = themeSounds[randomTheme];
            if (soundUrl) {
                const themeAudio = new Audio(soundUrl);
                themeAudio.play().catch(e => console.log("Sound blocked"));
            }

            btn.style.display = "none";
            btnDisplayWords.style.display = "block";
        }, 400); 

    }, 2500); 
};

let allWords = [];
let commonWords = [];

const parseWords = (text) => {
    return text.split(/[,\n]/)
        .map(word => word.trim())
        .filter(word => word.length >= 3 && !forbiddenWords.includes(word.toLowerCase()));
};

fetch('words/kaikkisanat.txt')
    .then(res => res.ok ? res.text() : Promise.reject(res.status))
    .then(data => {
        allWords = parseWords(data);
        console.log("Sanoja ladattu (all):", allWords.length);
    })
    .catch(err => console.error("Virhe ladattaessa kaikkisanat:", err));

fetch('words/yleisetsanat.txt')
    .then(res => res.ok ? res.text() : Promise.reject(res.status))
    .then(data => {
        commonWords = parseWords(data);
        console.log("Sanoja ladattu (common):", commonWords.length);
    })
    .catch(err => console.error("Virhe ladattaessa yleisetsanat:", err));

const capitalize = (word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();

const switchToWords = () => {
    flipSound.currentTime = 0.3;
    flipSound.play().catch(e => console.log("Sound blocked"));

    const selectedWords = [];
    const usedFirstLetters = new Set();

    // 1. Первое слово из allWords
    if (allWords.length > 0) {
        const randomIndex = Math.floor(Math.random() * allWords.length);
        let word = capitalize(allWords[randomIndex]);
        
        selectedWords.push(word);
        usedFirstLetters.add(word[0].toLowerCase());
        allWords.splice(randomIndex, 1);
    }

    // 2. ИСПРАВЛЕНО: Безопасный добор 4 слов без риска бесконечного цикла или пропуска элементов
    let attempts = 0;
    const maxAttempts = commonWords.length; // Чтобы не зациклиться, если база пуста

    while (selectedWords.length < 5 && commonWords.length > 0 && attempts < maxAttempts) {
        const randomIndex = Math.floor(Math.random() * commonWords.length);
        const word = capitalize(commonWords[randomIndex]); 
        const firstLetter = word[0].toLowerCase();

        if (!usedFirstLetters.has(firstLetter)) {
            selectedWords.push(word);
            usedFirstLetters.add(firstLetter);
            commonWords.splice(randomIndex, 1);
        } else {
            // Если буква уже занята, удаляем слово, чтобы искать дальше, но увеличиваем счетчик попыток
            commonWords.splice(randomIndex, 1);
        }
        attempts++;
    }

    selectedWords.sort(() => Math.random() - 0.5);

    wordList.style.display = "block";
    wordList.innerHTML = selectedWords.map(w => `<li>${w}</li>`).join('');

    btnDisplayWords.style.display = "none";
    themeImage.style.display = "none";
    themeDisplay.style.display = "none";
    btn.style.display = "block";
    btn.style.opacity = "1";
    btn.disabled = false;
};

btn.addEventListener("click", randomizeTheme);
btnDisplayWords.addEventListener("click", switchToWords);
    </script>
</body>
</html>
